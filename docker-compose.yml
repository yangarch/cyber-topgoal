version: '3.8'

services:
  web:
    build: .
    ports:
      - "8004:8004"
    volumes:
      - ./music_files:/music
      - ./data:/data
    environment:
      - MUSIC_DIR=/music
      - DATA_DIR=/data
      # 접근 보호: .env 파일에서 값을 읽어온다 (아래 값이 비어 있으면 인증 비활성화)
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    restart: unless-stopped
